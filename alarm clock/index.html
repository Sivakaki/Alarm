<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarm Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="time">
            <span id="hrs">00</span>
            <span>:</span>
            <span id="min">00</span>
            <span>:</span>
            <span id="sec">00</span>
        </div>
        <div class="time">
            <input type="time" id="time" placeholder="00:00">
        </div>
        <div class="buttons">
            <button id="set">SET</button>
            <button id="clear">CLEAR</button>
            <button id="stop">STOP</button>
        </div>
        <div id="error"></div>
        <ul id="alarms"></ul>
        <audio id="alarmsound" src="./sounds/soundreality-alarm-471496.mp3"></audio>
    </div>
    <script src="script.js"></script>
</body>
</html>
